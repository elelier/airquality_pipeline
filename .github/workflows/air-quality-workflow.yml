name: Air Quality Pipeline

on:
  pull_request:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force city updates regardless of last_successful_update_at'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test:
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
        run: pytest

  build:
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
        run: pytest
      - name: Configure environment variables
        env:
          AIRVISUAL_API_KEY: ${{ secrets.AIRVISUAL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo AIRVISUAL_API_KEY=${AIRVISUAL_API_KEY} > .env
          echo SUPABASE_URL=${SUPABASE_URL} >> .env
          echo SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY} >> .env
      - name: Run main.py
        env:
          AIRVISUAL_API_KEY: ${{ secrets.AIRVISUAL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
            python main.py --force-update | tee pipeline.log
          else
            python main.py | tee pipeline.log
          fi
        shell: bash
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: pipeline.log
