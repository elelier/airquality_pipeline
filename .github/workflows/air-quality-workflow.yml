name: Air Quality Pipeline

on:
  pull_request:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force city updates regardless of last_successful_update_at'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      provider:
        description: 'Air quality provider to use for manual runs'
        required: false
        default: 'waqi'
        type: choice
        options:
          - 'waqi'
          - 'airvisual'
      rpc_contract_health:
        description: 'Run read-only RPC contract/freshness health check after tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      weather_history_backfill:
        description: 'Run controlled Open-Meteo weather history backfill instead of hourly pipeline'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'dry_run'
          - 'apply'
      weather_history_backfill_city_id:
        description: 'Optional city_id for weather history backfill; leave blank for all active cities'
        required: false
        default: ''
        type: string
      weather_history_backfill_days:
        description: 'Weather history backfill window in days'
        required: false
        default: '90'
        type: string
      weather_history_backfill_batch_size:
        description: 'Weather history backfill max candidate rows per city'
        required: false
        default: '100'
        type: string

jobs:
  test:
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
          AIR_QUALITY_PROVIDER: waqi
        run: pytest

  build:
    runs-on: windows-latest
    if: github.event_name != 'pull_request' && github.event.inputs.rpc_contract_health != 'true' && github.event.inputs.weather_history_backfill == 'false'
    env:
      AIR_QUALITY_PROVIDER: ${{ github.event.inputs.provider || 'waqi' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
          AIR_QUALITY_PROVIDER: waqi
        run: pytest
      - name: Configure environment variables
        env:
          AIRVISUAL_API_KEY: ${{ secrets.AIRVISUAL_API_KEY }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AIR_QUALITY_PROVIDER: ${{ env.AIR_QUALITY_PROVIDER }}
        run: |
          echo AIR_QUALITY_PROVIDER=${AIR_QUALITY_PROVIDER} > .env
          echo AIRVISUAL_API_KEY=${AIRVISUAL_API_KEY} >> .env
          echo WAQI_API_TOKEN=${WAQI_API_TOKEN} >> .env
          echo SUPABASE_URL=${SUPABASE_URL} >> .env
          echo SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY} >> .env
      - name: Run main.py
        env:
          AIR_QUALITY_PROVIDER: ${{ env.AIR_QUALITY_PROVIDER }}
          AIRVISUAL_API_KEY: ${{ secrets.AIRVISUAL_API_KEY }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
            python main.py --force-update | tee pipeline.log
          else
            python main.py | tee pipeline.log
          fi
        shell: bash
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: pipeline.log

  rpc-contract-health:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rpc_contract_health == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
          AIR_QUALITY_PROVIDER: waqi
        run: pytest
      - name: Run RPC contract health check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/rpc_contract_health.py | tee rpc-contract-health.log
        shell: bash
      - name: Upload RPC contract health log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpc-contract-health-log
          path: rpc-contract-health.log

  weather-history-backfill:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.weather_history_backfill != 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          SKIP_PIPELINE_DELAYS: '1'
          AIR_QUALITY_PROVIDER: waqi
        run: pytest
      - name: Run weather history backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEATHER_BACKFILL_MODE: ${{ github.event.inputs.weather_history_backfill }}
          WEATHER_BACKFILL_CITY_ID: ${{ github.event.inputs.weather_history_backfill_city_id }}
          WEATHER_BACKFILL_DAYS: ${{ github.event.inputs.weather_history_backfill_days }}
          WEATHER_BACKFILL_BATCH_SIZE: ${{ github.event.inputs.weather_history_backfill_batch_size }}
        run: |
          ARGS="--days ${WEATHER_BACKFILL_DAYS} --batch-size ${WEATHER_BACKFILL_BATCH_SIZE}"
          if [ -n "${WEATHER_BACKFILL_CITY_ID}" ]; then
            ARGS="$ARGS --city-id ${WEATHER_BACKFILL_CITY_ID}"
          fi
          if [ "${WEATHER_BACKFILL_MODE}" = "apply" ]; then
            ARGS="$ARGS --apply"
          fi
          python scripts/weather_history_backfill.py $ARGS | tee weather-history-backfill.log
        shell: bash
      - name: Upload weather history backfill log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-history-backfill-log
          path: weather-history-backfill.log
